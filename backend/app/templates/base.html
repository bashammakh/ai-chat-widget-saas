<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Admin · AI Chat Widget{% endblock %}</title>
  <style>
    :root { --bg:#0f172a; --panel:#1e293b; --line:#334155; --txt:#e2e8f0;
            --muted:#94a3b8; --accent:#6366f1; --ok:#22c55e; --danger:#ef4444; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: system-ui, "Segoe UI", Roboto, sans-serif;
           background:var(--bg); color:var(--txt); }
    header { background:var(--panel); border-bottom:1px solid var(--line);
             padding:14px 24px; display:flex; gap:24px; align-items:center; }
    header a { color:var(--txt); text-decoration:none; font-weight:600; }
    header a:hover { color:var(--accent); }
    .brand { font-size:18px; }
    main { max-width:1000px; margin:0 auto; padding:28px 24px; }
    .card { background:var(--panel); border:1px solid var(--line);
            border-radius:12px; padding:20px; margin-bottom:20px; }
    h1 { font-size:22px; margin:0 0 18px; }
    h2 { font-size:16px; margin:0 0 14px; color:var(--muted);
         text-transform:uppercase; letter-spacing:.05em; }
    table { width:100%; border-collapse:collapse; }
    th,td { text-align:left; padding:10px 12px; border-bottom:1px solid var(--line);
            font-size:14px; vertical-align:top; }
    th { color:var(--muted); font-weight:600; }
    code { background:#0b1220; padding:2px 6px; border-radius:6px; font-size:13px;
           word-break:break-all; }
    input, button, textarea { font:inherit; }
    input[type=text], input[type=file] { width:100%; padding:9px 11px;
            border-radius:8px; border:1px solid var(--line); background:#0b1220;
            color:var(--txt); }
    .row { display:flex; gap:12px; align-items:flex-end; flex-wrap:wrap; }
    .row > div { flex:1; min-width:200px; }
    label { display:block; font-size:13px; color:var(--muted); margin-bottom:6px; }
    button { background:var(--accent); color:#fff; border:0; padding:10px 16px;
             border-radius:8px; cursor:pointer; font-weight:600; }
    button:hover { filter:brightness(1.1); }
    button.danger { background:var(--danger); }
    a.btn { display:inline-block; background:var(--accent); color:#fff;
            padding:8px 14px; border-radius:8px; text-decoration:none; font-weight:600; }
    .muted { color:var(--muted); }
    .pill { background:#0b1220; border:1px solid var(--line); padding:2px 8px;
            border-radius:999px; font-size:12px; }
  </style>
</head>
<body>
  <header>
    <span class="brand">🤖 AI Chat Widget</span>
    <a href="/admin">Dashboard</a>
    <a href="/admin/logs">Chat Logs</a>
    <a href="/admin/settings">Settings</a>
    <a href="/docs" target="_blank">API Docs</a>
  </header>
  <main>{% block content %}{% endblock %}</main>
</body>
</html>
