# Reverse proxy for the FastAPI backend + static hosting for the widget.
#
# HTTP server. Replace server_name and enable the HTTPS block below once you
# have TLS certificates (e.g. from certbot / Let's Encrypt).

upstream backend {
    server backend:8000;
}

# --- HTTP (port 80) ---
server {
    listen 80;
    server_name chat.example.com;

    # Allow ACME http-01 challenges for certbot.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # --- Static widget assets ---
    # widget.js is loaded cross-origin by customer sites, so allow CORS reads.
    location = /widget.js {
        root /usr/share/nginx/html;
        add_header Access-Control-Allow-Origin "*";
        add_header Cache-Control "public, max-age=300";
        types { application/javascript js; }
        try_files /widget.js =404;
    }

    location = /widget.css {
        root /usr/share/nginx/html;
        add_header Access-Control-Allow-Origin "*";
    }

    # --- API + admin + docs proxied to FastAPI ---
    location ~ ^/(api|admin|docs|openapi.json|health)(/|$) {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Demo page and other static files.
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ =404;
    }

    client_max_body_size 25m;

    # --- To enable HTTPS, comment the listen 80 default above for app traffic,
    #     redirect to https, and uncomment the TLS server block below. ---
    # return 301 https://$host$request_uri;
}

